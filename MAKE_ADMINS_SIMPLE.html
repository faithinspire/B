<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Users Admins</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .message.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
        
        .admins-list {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
        }
        
        .admins-list h2 {
            color: #333;
            font-size: 16px;
            margin-bottom: 15px;
        }
        
        .admin-item {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        
        .admin-email {
            color: #333;
            font-weight: 500;
        }
        
        .admin-badge {
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .counter {
            color: #666;
            font-size: 12px;
            margin-top: 10px;
        }
        
        .instructions {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 30px;
            font-size: 13px;
            color: #333;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👑 Make Users Admins</h1>
        <p class="subtitle">Give admin access to your BraidMee platform</p>
        
        <div class="instructions">
            <strong>Instructions:</strong>
            <ol style="margin-left: 20px; margin-top: 10px;">
                <li>Enter the email of a user you want to make admin</li>
                <li>Click "Make Admin"</li>
                <li>Repeat for up to 3 users</li>
                <li>Admins can access /admin dashboard</li>
            </ol>
        </div>
        
        <form id="adminForm">
            <div class="form-group">
                <label for="email">User Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="user@example.com"
                    required
                >
            </div>
            
            <button type="submit" id="submitBtn">Make Admin</button>
            
            <div id="message" class="message"></div>
        </form>
        
        <div class="admins-list">
            <h2>Current Admins</h2>
            <div id="adminsList">
                <p style="color: #999; font-size: 14px;">Loading admins...</p>
            </div>
            <div class="counter">
                <span id="adminCount">0</span> admin(s) total
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('adminForm');
        const emailInput = document.getElementById('email');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');
        const adminsList = document.getElementById('adminsList');
        const adminCount = document.getElementById('adminCount');

        // Load admins on page load
        loadAdmins();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            
            if (!email) {
                showMessage('Please enter an email address', 'error');
                return;
            }

            submitBtn.disabled = true;
            showMessage('Making user admin...', 'loading');

            try {
                const response = await fetch('/api/admin/make-admin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email }),
                });

                const data = await response.json();

                if (!response.ok) {
                    showMessage(data.error || 'Failed to make user admin', 'error');
                } else {
                    showMessage(`✅ ${email} is now an admin!`, 'success');
                    emailInput.value = '';
                    
                    // Reload admins list
                    setTimeout(loadAdmins, 1000);
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
            }
        });

        async function loadAdmins() {
            try {
                const response = await fetch('/api/admin/make-admin');
                const data = await response.json();

                if (data.success && data.admins) {
                    adminCount.textContent = data.total;
                    
                    if (data.admins.length === 0) {
                        adminsList.innerHTML = '<p style="color: #999; font-size: 14px;">No admins yet</p>';
                    } else {
                        adminsList.innerHTML = data.admins.map(admin => `
                            <div class="admin-item">
                                <span class="admin-email">${admin.email}</span>
                                <span class="admin-badge">ADMIN</span>
                            </div>
                        `).join('');
                    }
                }
            } catch (error) {
                console.error('Error loading admins:', error);
                adminsList.innerHTML = '<p style="color: #999; font-size: 14px;">Error loading admins</p>';
            }
        }

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
        }
    </script>
</body>
</html>
